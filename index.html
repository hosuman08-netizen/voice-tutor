<html lang="ko"><head>
<meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Voice Tutor</title>

<link rel="manifest" href="manifest.json"/>
<style>
:root{--bg:#0b0a10;--surf:#15131d;--gold:#e0b552;--dim:#8a8398;--txt:#ece8f1;--line:#2a2438;--ok:#4ade80;--bad:#f87171}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--txt);font-family:system-ui,-apple-system,sans-serif;padding:18px 14px 56px;line-height:1.45;max-width:440px;margin:0 auto}
h1{font-size:1.4rem;color:var(--gold);font-weight:800}
.sub{color:var(--dim);font-size:12px;margin:6px 0 12px}
.card{background:var(--surf);border:1px solid var(--line);border-radius:14px;padding:14px;margin:10px 0}
.row{display:flex;gap:8px;flex-wrap:wrap}
button,.btn{border:0;border-radius:10px;padding:11px 14px;font-weight:700;cursor:pointer;background:var(--gold);color:#111;font-size:14px}
button.sec{background:#1c1826;color:var(--txt);border:1px solid var(--line)}
button:active{transform:scale(.98)}
input,select,textarea{width:100%;background:#0e0c14;border:1px solid var(--line);border-radius:10px;color:var(--txt);padding:10px;margin:6px 0;font-size:14px}
.bar{height:10px;background:#1c1826;border-radius:99px;overflow:hidden;margin:8px 0}
.bar>i{display:block;height:100%;background:linear-gradient(90deg,var(--gold),#fff3);width:0;transition:width .25s}
.chip{display:inline-block;padding:4px 8px;border-radius:999px;background:#1c1826;font-size:11px;color:var(--dim);margin:2px}
.chip b{color:var(--gold)}
#out{font-size:13px;margin-top:8px;white-space:pre-wrap}
a{color:var(--gold)}
footer{text-align:center;color:var(--dim);font-size:11px;margin-top:22px;line-height:1.6}

</style></head><body>
